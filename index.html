    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M 10 15 L 28 15 L 53 50 L 28 85 L 10 85 L 35 50 Z%22 fill=%22%23C5A059%22/><path d=%22M 46 15 L 64 15 L 89 50 L 64 85 L 46 85 L 71 50 Z%22 fill=%22%23C5A059%22/></svg>">
    <script>
      (function() {
        const suppressKeywords = [
          'cdn.tailwindcss.com',
          'contentscript.js',
          'chrome-extension://',
          'extension',
          'React DevTools',
          'react-devtools'
        ];
        
        function shouldSuppress(args) {
          try {
            // 1. Check message arguments
            for (let i = 0; i < args.length; i++) {
              const arg = args[i];
              if (arg && typeof arg === 'string') {
                for (let j = 0; j < suppressKeywords.length; j++) {
                  if (arg.includes(suppressKeywords[j])) return true;
                }
              }
            }
            // 2. Check caller stack trace (crucial for finding contentscript.js origin)
            const stack = new Error().stack;
            if (stack) {
              for (let k = 0; k < suppressKeywords.length; k++) {
                if (stack.includes(suppressKeywords[k])) return true;
              }
            }
          } catch (e) {}
          return false;
        }

        const originalWarn = console.warn;
        console.warn = function(...args) {
          if (shouldSuppress(args)) return;
          originalWarn.apply(console, args);
        };

        const originalError = console.error;
        console.error = function(...args) {
          if (shouldSuppress(args)) return;
          originalError.apply(console, args);
        };

        const originalLog = console.log;
        console.log = function(...args) {
          if (shouldSuppress(args)) return;
          originalLog.apply(console, args);
        };
      })();
    </script>
